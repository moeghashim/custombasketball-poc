name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Maestro health check
        run: |
          curl --fail --silent --show-error --location \
            --retry 2 \
            --retry-delay 5 \
            --max-time 20 \
            https://custombasketball-maestro.onrender.com/health
