<!-- ════════════════════════════════════════════════════════════════════════
     DATA — everything the animation shows lives in this one object.
     Edit it, or replace `window.FLOW` at runtime with real data, then call
     window.renderFlow() to re-render. Each step's `type` chooses the stage:

       type:"build"        data:{ url, logs:[{kind:'cmd'|'ok'|'arr'|'dim'|'', text}] }
       type:"research"     data:{ query, signals, coreLabel, sources:["Google", …] }
       type:"competitors"  data:{ axes:{top,bottom,left,right},
                                   competitors:[{name, score, x, y, you?, color?}] }   // x/y are % on the matrix
       type:"report"       data:{ eyebrow, heading, meta:[…], doneLabel,
                                   kpis:[{prefix, value, decimals, suffix, label}],
                                   chart:[40,58,…] }                                    // bar heights in %

     Per-step `durationMs` overrides the global `stepDurationMs`.
     ════════════════════════════════════════════════════════════════════════ -->
<script type="application/json" id="flow-data">
{

<script type="text/babel">
  // Read the JSON payload (or use a runtime-provided window.FLOW).
  window.FLOW = window.FLOW || JSON.parse(document.getElementById('flow-data').textContent);

  /* ── MODE ────────────────────────────────────────────────────────────────
     'auto' = fixed clock, self-playing (each step plays for its duration).
     'live' = event-driven; nothing advances until YOUR code calls the
              controller. Below is a simulated backend so you can see it work —
              replace `backendDemo` with your websocket / SSE / poll handlers. */
  const MODE = 'live';            // ← flip to 'auto' for the timed demo
  window.FLOW.mode = MODE;

  const _root = ReactDOM.createRoot(document.getElementById('root'));

  if (MODE === 'live') {
    const controller = window.flowController = createFlowController(window.FLOW);

    // How many reveal-steps each stage has (so we can drive `progress`).
    const itemCount = (step) => {
      const d = step.data || {};
      if (step.type === 'build') return Math.max((d.logs || []).length, 5);
      if (step.type === 'research') return (d.sources || []).length;
      if (step.type === 'competitors') return (d.competitors || []).length;
      if (step.type === 'report') return 5 + (d.kpis || []).length;
      return 1;
    };

    // ▼▼ SIMULATED BACKEND — stands in for real events. Each `c.*` call is the
    //    line you'd run from a websocket message / fetch result / SSE event. ▼▼
    function backendDemo(c) {
      let t = 0; const at = (ms, fn) => { t += ms; c.after(t, fn); };
      window.FLOW.steps.forEach((step) => {
        at(350, () => c.activate(step.id));                  // step started
        const items = itemCount(step);
        const stagger = step.type === 'report' ? 360 : step.type === 'competitors' ? 520 : 430;
        for (let k = 1; k <= items; k++) at(stagger, () => c.progress(step.id, k)); // each sub-result lands
        at(450, () => c.complete(step.id));                  // step finished → advances
      });
    }
    // ▲▲ Example of *truly* dynamic data (items discovered at runtime):
    //    c.activate('market');
    //    socket.on('source',  s => c.pushSource('market', s));
    //    socket.on('signals', n => c.mergeData('market', { signals: n }));
    //    socket.on('done',    () => c.complete('market'));

    window.renderFlow = () => _root.render(<AgentFlow flow={window.FLOW} controller={controller} />);
    window.renderFlow();
    controller.start(backendDemo);   // kick off; Replay re-runs the same driver
  } else {
    window.renderFlow = () => _root.render(<AgentFlow flow={window.FLOW} />);
    window.renderFlow();
  }
</script>
</body>
